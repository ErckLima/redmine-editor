<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Brilho superior -->
  <rect width="64" height="32" rx="14" fill="url(#shine)"/>

  <!-- Folha de papel -->
  <rect x="13" y="10" width="30" height="38" rx="3" fill="#ffffff" opacity="0.95"/>
  <!-- Dobra da folha -->
  <path d="M35 10 L43 18 L35 18 Z" fill="#c9c0e8"/>
  <path d="M35 10 L43 18 H35 Z" fill="#e8e4f5"/>

  <!-- Linhas de texto na folha -->
  <rect x="17" y="22" width="18" height="2.5" rx="1.2" fill="#667eea" opacity="0.7"/>
  <rect x="17" y="27" width="22" height="2.5" rx="1.2" fill="#aaa" opacity="0.5"/>
  <rect x="17" y="32" width="16" height="2.5" rx="1.2" fill="#aaa" opacity="0.5"/>
  <rect x="17" y="37" width="20" height="2.5" rx="1.2" fill="#aaa" opacity="0.5"/>

  <!-- Lápis -->
  <g transform="rotate(-38, 46, 46)">
    <rect x="40" y="36" width="7" height="20" rx="1.5" fill="#f9ca24"/>
    <rect x="40" y="36" width="7" height="4" rx="1.5" fill="#e0b800"/>
    <polygon points="40,56 47,56 43.5,63" fill="#f0d0a0"/>
    <polygon points="41.5,59 45.5,59 43.5,63" fill="#c0a060"/>
    <!-- Borracha -->
    <rect x="40" y="32" width="7" height="5" rx="1" fill="#ff6b9d"/>
    <rect x="40" y="36" width="7" height="1" fill="#c0a800"/>
  </g>
</svg>
